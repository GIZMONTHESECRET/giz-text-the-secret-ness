<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Business</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.container {
  max-width:600px;
  margin:auto;
  padding:20px;
}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:10px 0;
}
input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}
button {
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
}
h2 {color:#22c55e;}
</style>
</head>

<body>

<div class="container">

<h1>📊 Dashboard ROAS</h1>

<div class="card">
<h3>💸 Dépenses pub (€)</h3>
<input type="number" id="ads">
</div>

<div class="card">
<h3>💰 Chiffre d'affaires (€)</h3>
<input type="number" id="revenue">
</div>

<div class="card">
<h3>📦 Nombre de ventes</h3>
<input type="number" id="sales">
</div>

<button onclick="calc()">CALCULER</button>

<div class="card">
<h2 id="profit"></h2>
<h2 id="roas"></h2>
<h2 id="cpa"></h2>
</div>

</div>

<script>

function calc(){

let ads = parseFloat(document.getElementById("ads").value) || 0;
let revenue = parseFloat(document.getElementById("revenue").value) || 0;
let sales = parseFloat(document.getElementById("sales").value) || 1;

let profit = revenue - ads;
let roas = revenue / ads;
let cpa = ads / sales;

document.getElementById("profit").innerText = "💰 Profit : " + profit.toFixed(2) + "€";
document.getElementById("roas").innerText = "📈 ROAS : " + roas.toFixed(2);
document.getElementById("cpa").innerText = "🎯 CPA : " + cpa.toFixed(2) + "€";

}

</script>

</body>
</html>
